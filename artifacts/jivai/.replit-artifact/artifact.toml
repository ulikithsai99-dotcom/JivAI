kind = "web"
previewPath = "/"
title = "JivAI — Emergency Crisis Response"
version = "1.0.0"
id = "artifacts/jivai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20185

[services.development]
run = "pnpm --filter @workspace/jivai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jivai", "run", "build" ]
publicDir = "artifacts/jivai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20185"
BASE_PATH = "/"
